kind: Deployment
apiVersion: apps/v1
metadata:
  name: warppod
  labels:
    app: warppod
spec:
  selector:
    matchLabels:
      app: warppod
  template:
    metadata:
      labels:
        app: warppod
    spec:
      securityContext:
        fsGroup: 2000
      serviceAccountName: admin
      restartPolicy: Always
      volumes:
      - name: warp-vol
        persistentVolumeClaim:
          claimName: warp-s3
      containers:
      - name: warp
        image: quay.io/ocsci/warp:latest
        resources:
          limits:
            memory: "2048Mi"
            cpu: "150m"
        command: ["/bin/bash", "-ce", "tail -f /dev/null" ]
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - mountPath: /mnt
          name: warp-vol
        readinessProbe:
          exec:
            command: ["true"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
