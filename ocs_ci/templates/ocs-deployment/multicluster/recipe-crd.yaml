                        type: integer
                      skipHookIfNotPresent:
                        description: Flag to skip a Hook.
                        type: boolean
                        default: false
                      singlePodOnly:
                        description: |-
                          Boolean flag that indicates whether to execute command on a single pod or on all pods that
