                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                type: array
                                items:
                                  type: string
                                x-kubernetes-list-type: atomic
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                          additionalProperties:
                            type: string
                      x-kubernetes-map-type: atomic
                    parent:
                      description: |-
                        Name of the parent group defined in the associated Application CR. Optional - If unspecified,
                        parent group is represented by the implicit default group of Application CR (implies the
                        Application CR does not specify groups explicitly).
                      type: string
                    selectResource:
                      description: Determines the resource type which the fields labelSelector and nameSelector apply to for selecting PVCs. Default selection is pvc. Valid for volume groups only.
                      type: string
                      enum:
                        - pvc
                        - pod
                        - deployment
                        - statefulset
                    nameSelector:
                      description: 'If specified, resource''s object name needs to match this expression. Valid for volume groups only.'
                      type: string
                    name:
                      description: Name of the group
                      type: string
                    essential:
                      description: 'Defaults to true, if set to false, a failure is not necessarily handled as fatal'
                      type: boolean
                    includedResourceTypes:
                      description: 'List of resource types to include. If unspecified, all resource types are included.'
                      type: array
                      items:
                        type: string
                    backupRef:
                      description: |-
                        Used for groups solely used in restore workflows to refer to another group that is used in
                        backup workflows.
                      type: string
                    includeClusterResources:
                      description: |-
                        Whether to include any cluster-scoped resources. If nil or true, cluster-scoped resources are
                        included if they are associated with the included namespace-scoped resources
                      type: boolean
                    labelSelector:
                      description: Select items based on label
                      type: object
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                          type: array
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            type: object
                            required:
                              - key
                              - operator
                            properties:
                              key:
                                description: key is the label key that the selector applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                type: array
                                items:
                                  type: string
                                x-kubernetes-list-type: atomic
                          x-kubernetes-list-type: atomic
                        matchLabels:
