                        type: array
                        items:
                          type: string
                      type:
                        description: 'Determines the type of group - volume data only, resources only'
                        type: string
                        enum:
                          - volume
                          - resource
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map
                hooks:
