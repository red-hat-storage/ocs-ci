                      type: string
                      enum:
                        - volume
                        - resource
                workflows:
                  description: Workflow is the sequence of actions to take
                  type: array
                  items:
                    description: Workflow is the sequence of actions to take
                    type: object
                    required:
                      - name
                      - sequence
                    properties:
                      failOn:
                        description: 'Implies behaviour in case of failure: any-error (default), essential-error, full-error'
                        type: string
                        default: any-error
                        enum:
                          - any-error
                          - essential-error
                          - full-error
                      name:
                        description: |-
                          Name of recipe. Names "backup" and "restore" are reserved and implicitly used by default for
                          backup or restore respectively
                        type: string
                      sequence:
                        description: |-
                          List of the names of groups or hooks, in the order in which they should be executed
                          Format: <group|hook>: <group or hook name>[/<hook op>]
                        type: array
                        items:
                          type: object
                          additionalProperties:
                            type: string
                  x-kubernetes-list-map-keys:
                    - name
                  x-kubernetes-list-type: map
            status:
              description: RecipeStatus defines the observed state of Recipe
              type: object
