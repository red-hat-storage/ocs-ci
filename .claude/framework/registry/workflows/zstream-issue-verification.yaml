id: zstream-issue-verification
default: true
name: DFBUGS Z-stream ON_QA verification
coordinator_agent: orchestrator-coordinator
description: |
  Autonomous verification of DFBUGS issues in ON_QA for a target ODF z-stream.

defaults:
  skip_label: skip-ocsci-agent
  version_positional_label: "ODF version"
  dry_run_env_var: DFBUGS_DRY_RUN

custom_fields:
  target_release: customfield_10886
  prod_build_version: customfield_10566

params:
  odf_version:
    required: true
    description: Target ODF z-stream from run.sh positional argument (varies per run)
    example: "<odf-version>"
  jira_status:
    default: ON_QA
  jira_project:
    default: DFBUGS
  cluster_profile:
    default: default
  parallel_issues:
    default: 1
    description: Future — run N issues concurrently (keep 1 for safety initially)
  dry_run:
    default: false
    description: |
      When true, run full workload (scripts, cluster, reports) but skip all
      JIRA and GitHub mutations. Set via run.sh --dry-run or DFBUGS_DRY_RUN=1.

phases:
  - id: preflight
    steps:
      - hook: .claude/hooks/pre-execution/check_workspace.sh
      - script: .claude/framework/orchestrator/setup_mcp.sh
      - script: .claude/framework/orchestrator/preflight_mcp.sh

  - id: discovery
    agent: jira-discovery
    outputs:
      - discovery/issues.json

  - id: per_issue
    foreach: discovery/issues.json#issue_keys
    pipeline:
      - agent: jira-analysis
        on_skip: continue
      - agent: cluster-compat
        on_skip: continue
      - agent: repro-extraction
        branches:
          insufficient_info: jira_need_info
      - agent: script-generation
      - hook: .claude/hooks/safety/validate_script.sh
        args: ["$JIRA_AGENT_WORKSPACE/artifacts/{issue_key}/verify.sh"]
      - agent: verification-execution
      - hook: .claude/hooks/post-execution/cluster_health_collect.sh
        args: ["{issue_key}"]
      - agent: cluster-health-detection
      - agent: infra-diagnosis
        when: execution.failed or cluster_health.degraded
      - agent: github-automation
        when: automation_candidate
      - agent: reporting
      - hook: .claude/hooks/post-execution/sync_memory.sh
        args: ["{issue_key}"]

  - id: finalize
    agent: reporting
    outputs:
      - reports/summary.md
      - reports/metrics.json

jira_need_info:
  label: Need Info
  transition: Assigned

outcomes:
  verified:
    transition: VERIFIED
  reproduced:
    label: FailedQA
    transition: Assigned

policy: .claude/configs/policies/safety.yaml
cluster: .claude/configs/clusters/default.yaml
