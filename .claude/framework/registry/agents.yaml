# Agent catalog — source of truth for reusable Claude subagents.
# Add an entry here, create the .md under path, reference from any workflow.
# workflows: [all] means the agent is reusable across any workflow.

agents:
  orchestrator-coordinator:
    path: .claude/agents/orchestrator-coordinator.md
    model: sonnet
    description: Dispatch specialists, aggregate reports, manage workflow state.
    skills:
      - .claude/skills/dry-run/SKILL.md
      - .claude/skills/mcp/SKILL.md
    tags: [orchestrator]
    workflows: [all]

  jira-discovery:
    path: .claude/agents/jira-discovery.md
