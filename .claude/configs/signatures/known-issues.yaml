# Known error signatures for cluster-health-detection correlation.
# Single source of truth for both static patterns and runtime-learned signatures.
#
# regex: case-insensitive pattern; classification: Critical|Major|Minor|Infra|Noise
#
# To persist a new signature discovered at runtime, append an entry to
# the 'signatures' list below.  Previously this was done via the now-removed
# .claude/memory/anomaly_signatures.py helper; all new signatures should be
# added directly to this file instead.

signatures:
  - regex: 'MON_DOWN|mon is down'
    classification: Critical
    component: rook-ceph-mon
    dfbugs_key: null
    notes: Monitor quorum issue

  - regex: 'OSD_DOWN|osds down'
    classification: Major
    component: ceph-osd
    dfbugs_key: null

  - regex: 'CrashLoopBackOff'
    classification: Major
    component: pod
    dfbugs_key: null

  - regex: 'noobaa.*(error|fail)'
    classification: Major
    component: noobaa
    dfbugs_key: null

  - regex: 'ProvisioningFailed|FailedMount'
    classification: Major
    component: csi
    dfbugs_key: null

  - regex: 'connection refused.*kubernetes.default'
    classification: Infra
    component: api
    dfbugs_key: null

  - regex: 'leader election lost'
    classification: Noise
    component: operator
    dfbugs_key: null
    notes: Transient during rollout
