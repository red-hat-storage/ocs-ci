# Copy to e.g. pipelines/configs/my-odf-4.22-run.yaml and customize.
# Local run configs are gitignored — see pipelines/configs/.gitignore

pipeline: issue_verification
description: ODF 4.22 z-stream Lane C qualification run

# Pipeline parameters (see pipelines/issue_verification.yaml)
parameters:
  odf_version: "4.22"
  deploy_job_url: https://jenkins-csb-odf-qe-ocs4.dno.corp.redhat.com/job/qe-deploy-ocs-cluster/123/
  # jira_config: /path/to/jira.cfg

# Override pipeline defaults (optional)
defaults:
  dry_run: true
  top_n: 10
  use_claude: false
  refresh_jira: true
  live_repro_dry_run: true
  skip_on_env_mismatch: true
  oc_command_path: oc
  live_repro_model: null
  live_repro_max_turns: 40
  live_repro_backend: auto
  tests_per_issue: 1
  force_live_repro: false

# Run control (optional; CLI flags override when set)
run:
  # run_id: 20260622_194551
  # from_stage: ocs_ci_execution
  # until_stage: test_matching
  force: false
