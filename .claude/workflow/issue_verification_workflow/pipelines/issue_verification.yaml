name: issue_verification
version: "1"
description: >
  ODF z-stream Lane C verification — JIRA intake, repro steps, live cluster
  verification (optional), test matching, and optional Jenkins execution.

parameters:
  odf_version:
    required: true
    description: ODF z-stream target version (e.g. 4.22 or odf-4.22)
  deploy_job_url:
    required: false
    description: Jenkins deploy build URL for cluster verification and Stage 5 tests
  jira_config:
    required: false
    description: Path to jira.cfg (optional; uses data/auth.yaml by default)
  force_live_repro:
    required: false
    default: false
    description: Run live repro even when environment mismatches issue
  issues:
    required: false
    description: >
      Explicit JIRA keys to process (e.g. DFBUGS-784). When set, stage 1
      fetches only these issues and skips ON_QA JQL search.

defaults:
  skip_if_completed: true
  top_n: 10
  use_claude: false
  test_match_backend: auto
  refresh_jira: true
  include_fix_prs: true
  live_repro_dry_run: true
  skip_on_env_mismatch: true
  oc_command_path: oc
  live_repro_model: null
  live_repro_max_turns: 40
  live_repro_backend: auto
  dry_run: true
  tests_per_issue: 1
  repro_steps_backend: auto
  repro_claude_model: null
  repro_claude_max_turns: 20
  reporting_dry_run: true
  reporting_template: issue_verification.md.j2
  reporting_channels:
    - type: file
  issue_summary_enabled: true
  issue_summary_use_claude: true
  issue_summary_model: null

stages:
  jira_intake:
    agent: jira_search
    parameters:
      project: "Data Foundation Bugs"
      issue_type: Bug
      odf_version: $pipeline.parameters.odf_version
      status: ON_QA
      jira_config: $pipeline.parameters.jira_config
      issues: $pipeline.parameters.issues
    outputs:
      issues: issues

  repro_steps:
    agent: repro_steps
    needs: [jira_intake]
    parameters:
      issues: $stages.jira_intake.outputs.issues
      odf_version: $pipeline.parameters.odf_version
      jira_config: $pipeline.parameters.jira_config
      refresh_jira: $pipeline.defaults.refresh_jira
      include_fix_prs: $pipeline.defaults.include_fix_prs
      claude_model: $pipeline.defaults.repro_claude_model
      backend: $pipeline.defaults.repro_steps_backend
      max_turns: $pipeline.defaults.repro_claude_max_turns
    outputs:
      issues: issues

  live_cluster_verification:
    agent: live_repro
    needs: [repro_steps]
    when: $pipeline.parameters.deploy_job_url
    parameters:
      issues: $stages.repro_steps.outputs.issues
      deploy_job_url: $pipeline.parameters.deploy_job_url
      odf_version: $pipeline.parameters.odf_version
      dry_run: $pipeline.defaults.live_repro_dry_run
      skip_on_env_mismatch: $pipeline.defaults.skip_on_env_mismatch
      force: $pipeline.parameters.force_live_repro
      oc_command_path: $pipeline.defaults.oc_command_path
      claude_model: $pipeline.defaults.live_repro_model
      max_turns: $pipeline.defaults.live_repro_max_turns
      backend: $pipeline.defaults.live_repro_backend
    outputs:
      issues: issues

  test_matching:
    agent: test_matching
    needs: [repro_steps]
    parameters:
      issues: $stages.repro_steps.outputs.issues
      top_n: $pipeline.defaults.top_n
      use_claude: $pipeline.defaults.use_claude
      backend: $pipeline.defaults.test_match_backend
      claude_model: null
    outputs:
      issues: issues

  ocs_ci_execution:
    agent: ocs_ci_execution
    needs: [test_matching]
    when: $pipeline.parameters.deploy_job_url
    parameters:
      issues: $stages.test_matching.outputs.issues
      deploy_job_url: $pipeline.parameters.deploy_job_url
      dry_run: $pipeline.defaults.dry_run
      tests_per_issue: $pipeline.defaults.tests_per_issue
      run_teardown: false
    outputs:
      jenkins_results: jenkins_results

  reporting:
    agent: reporting
    needs: [test_matching, live_cluster_verification, ocs_ci_execution]
    parameters:
      odf_version: $pipeline.parameters.odf_version
      deploy_job_url: $pipeline.parameters.deploy_job_url
      template: $pipeline.defaults.reporting_template
      dry_run: $pipeline.defaults.reporting_dry_run
      channels: $pipeline.defaults.reporting_channels
      auth_file: null
      issue_summary_enabled: $pipeline.defaults.issue_summary_enabled
      issue_summary_use_claude: $pipeline.defaults.issue_summary_use_claude
      issue_summary_model: $pipeline.defaults.issue_summary_model
      tests_per_issue: $pipeline.defaults.tests_per_issue
    outputs:
      reporting: reporting
      report_file: report_file
