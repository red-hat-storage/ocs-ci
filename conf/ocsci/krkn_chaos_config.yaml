# Krkn chaos testing configuration

ENV_DATA:
  krkn_config:
    # Workload types: VDBENCH, CNV_WORKLOAD, GOSBENCH, FIO
    workloads:
      - VDBENCH
      - GOSBENCH

    # Run workloads during chaos testing
    run_workload: true

    # Enable data verification after chaos
    enable_verification: true

    # VDBENCH Configuration
    vdbench_config:
      enable_parallel_verification: true
      max_verification_threads: 16
      max_workload_restarts: 10
      workload_monitor_interval: 30

      # Common workload parameters
      threads: 16
      elapsed: 600
      interval: 60

      # Block workloads (RBD)
      block:
        size: "15g"

        patterns:
          - name: "random_write"
            rdpct: 0      # Write-only
            seekpct: 100  # Random I/O
            xfersize: "4k"
            skew: 0

          - name: "random_read"
            rdpct: 100    # Read-only
            seekpct: 100  # Random I/O
            xfersize: "8k"
            skew: 0

          - name: "mixed_workload"
            rdpct: 50     # 50% reads, 50% writes
            seekpct: 100  # Random I/O
            xfersize: "64k"
            skew: 0

      # Filesystem workloads (CephFS)
      filesystem:
        size: "10m"
        depth: 4
        width: 5
        files: 10
        file_size: "1m"
        group_all_fwds_in_one_rd: true

        patterns:
          - name: "sequential_write"
            rdpct: 0      # Write-only
            seekpct: 0    # Sequential I/O
            xfersize: "1m"
            skew: 0

          - name: "random_mixed"
            rdpct: 70     # 70% reads, 30% writes
            seekpct: 100  # Random I/O
            xfersize: "256k"
            skew: 0

          - name: "small_file_ops"
            rdpct: 50     # 50% reads, 50% writes
            seekpct: 100  # Random I/O
            xfersize: "4k"
            skew: 0

    # GOSBENCH configuration
    gosbench_config:
      worker_replicas: 1
      benchmark_duration: 2700
      object_size: "4MiB"
      object_count: 100000
      concurrency: 2
      server_image: "quay.io/mulbc/goroom-server:latest"
      worker_image: "quay.io/mulbc/goroom-worker:latest"
      server_resources:
        memory_request: "256Mi"
        memory_limit: "512Mi"
        cpu_request: "100m"
        cpu_limit: "500m"
      worker_resources:
        memory_request: "128Mi"
        memory_limit: "256Mi"
        cpu_request: "50m"
        cpu_limit: "200m"
