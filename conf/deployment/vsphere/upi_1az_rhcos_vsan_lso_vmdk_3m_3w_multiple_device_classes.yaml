---
# This config is for deploying with local storage and VMDK on vSphere with multiple device classes.
# This config is supposed to work on most of DCs we have.
DEPLOYMENT:
  allow_lower_instance_requirements: false
  local_storage: true
  type: 'VMDK'
  provision_type: 'thick'
  deploy_multiple_device_classes: true
ENV_DATA:
  platform: 'vsphere'
  deployment_type: 'upi'
  worker_replicas: 3
  master_replicas: 3
  worker_num_cpus: '16'
  master_num_cpus: '4'
  master_memory: '16384'
  compute_memory: '65536'
  fio_storageutilization_min_mbps: 10.0
REPORTING:
  polarion:
    deployment_id: 'OCS-7769'
