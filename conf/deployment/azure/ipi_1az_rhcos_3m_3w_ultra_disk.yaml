---
# Azure Ultra Disk deployment configuration
# Ultra Disk provides highest performance with customizable IOPS and throughput
# Note: Ultra Disk requires specific VM sizes and availability zone support
DEPLOYMENT:
  openshift_install_timeout: 4800
  allow_lower_instance_requirements: false
ENV_DATA:
  platform: 'azure'
  deployment_type: 'ipi'
  region: 'westeurope'
  azure_base_domain_resource_group_name: 'odfqe'
  azure_performance_plus: true
  azure_performance_plus_disk_type: 'UltraSSD_LRS'
  worker_availability_zones:
    - '1'
  master_availability_zones:
    - '1'
  worker_replicas: 3
  master_replicas: 3
  master_instance_type: 'Standard_D8s_v3'
  worker_instance_type: 'Standard_D16s_v3'
REPORTING:
  polarion:
    deployment_id: 'OCS-ULTRA'

